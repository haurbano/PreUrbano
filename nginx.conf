# Rate limiting zone: max 5 req/min per IP on /api/subscribe
limit_req_zone $binary_remote_addr zone=subscribe:10m rate=5r/m;

# Main site
server {
    listen 80;
    server_name preurbano.com www.preurbano.com _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    add_header X-Content-Type-Options "nosniff";
    add_header X-Frame-Options "DENY";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    location /api/subscribe {
        limit_req zone=subscribe burst=5 nodelay;
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    location ~* \.(css|js|ico|png|jpg|jpeg|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}

# Admin panel
server {
    listen 80;
    server_name admin.preurbano.com;

    location ~* ^/admin {
        return 301 /;
    }

    location / {
        proxy_pass http://backend:8000/admin/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_redirect http://backend:8000/admin/ /;
    }
}
