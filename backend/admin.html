<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PreUrbano — Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0f; --surface: #111118; --border: rgba(255,255,255,0.07);
      --accent: #6c63ff; --text: #f0f0f5; --muted: #8888a0;
      --green: #34d399; --red: #f87171;
    }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* ── Login ── */
    #login-screen {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
    }
    .login-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 20px; padding: 48px 40px; width: 100%; max-width: 380px;
    }
    .login-card h1 { font-size: 1.4rem; font-weight: 700; margin-bottom: 6px; }
    .login-card p { color: var(--muted); font-size: 0.88rem; margin-bottom: 28px; }
    .field { margin-bottom: 16px; }
    .field label { display: block; font-size: 0.8rem; color: var(--muted); margin-bottom: 6px; }
    .field input {
      width: 100%; background: rgba(255,255,255,0.04); border: 1px solid var(--border);
      border-radius: 10px; padding: 10px 14px; color: var(--text);
      font-family: 'Inter', sans-serif; font-size: 0.95rem; outline: none;
      transition: border-color 0.2s;
    }
    .field input:focus { border-color: rgba(108,99,255,0.5); }
    .btn {
      width: 100%; background: var(--accent); color: #fff; border: none;
      border-radius: 10px; padding: 12px; font-family: 'Inter', sans-serif;
      font-size: 0.95rem; font-weight: 600; cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.88; }
    .error-msg { color: var(--red); font-size: 0.82rem; margin-top: 12px; text-align: center; min-height: 18px; }

    /* ── Dashboard ── */
    #dashboard { display: none; }
    nav {
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 16px 32px; display: flex; align-items: center; justify-content: space-between;
    }
    .logo { font-size: 1rem; font-weight: 700; display: flex; align-items: center; gap: 8px; }
    .logo-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); }
    .logout-btn {
      background: transparent; border: 1px solid var(--border); color: var(--muted);
      border-radius: 8px; padding: 6px 14px; font-family: 'Inter', sans-serif;
      font-size: 0.82rem; cursor: pointer; transition: all 0.2s;
    }
    .logout-btn:hover { border-color: var(--red); color: var(--red); }

    main { max-width: 960px; margin: 0 auto; padding: 40px 24px; }
    .stats-row { display: flex; gap: 16px; margin-bottom: 32px; flex-wrap: wrap; }
    .stat-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 14px; padding: 20px 24px; flex: 1; min-width: 140px;
    }
    .stat-card .num { font-size: 2rem; font-weight: 700; letter-spacing: -1px; }
    .stat-card .lbl { font-size: 0.78rem; color: var(--muted); margin-top: 2px; }

    .section-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 16px;
    }
    .section-header h2 { font-size: 1rem; font-weight: 600; }
    .refresh-btn {
      background: transparent; border: 1px solid var(--border); color: var(--muted);
      border-radius: 8px; padding: 6px 14px; font-family: 'Inter', sans-serif;
      font-size: 0.82rem; cursor: pointer; transition: all 0.2s;
    }
    .refresh-btn:hover { border-color: var(--accent); color: var(--text); }

    table { width: 100%; border-collapse: collapse; }
    thead th {
      text-align: left; font-size: 0.75rem; font-weight: 500; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.06em;
      padding: 10px 16px; border-bottom: 1px solid var(--border);
    }
    tbody tr { transition: background 0.15s; }
    tbody tr:hover { background: rgba(255,255,255,0.02); }
    tbody td { padding: 12px 16px; font-size: 0.88rem; border-bottom: 1px solid var(--border); }
    .source-badge {
      display: inline-block; padding: 2px 10px; border-radius: 100px;
      font-size: 0.72rem; font-weight: 500;
    }
    .source-hero { background: rgba(108,99,255,0.15); color: #a59dff; }
    .source-cta  { background: rgba(56,189,248,0.12); color: #7dd3fc; }
    .empty-state {
      text-align: center; padding: 48px; color: var(--muted); font-size: 0.9rem;
    }
  </style>
</head>
<body>

<!-- Login -->
<div id="login-screen">
  <div class="login-card">
    <h1>PreUrbano Admin</h1>
    <p>Ingresa tu contraseña para continuar</p>
    <div class="field">
      <label>Contraseña</label>
      <input type="password" id="pwd" placeholder="••••••••" onkeydown="if(event.key==='Enter')login()" />
    </div>
    <button class="btn" onclick="login()">Ingresar</button>
    <div class="error-msg" id="login-error"></div>
  </div>
</div>

<!-- Dashboard -->
<div id="dashboard">
  <nav>
    <div class="logo"><div class="logo-dot"></div> PreUrbano Admin</div>
    <button class="logout-btn" onclick="logout()">Cerrar sesión</button>
  </nav>
  <main>
    <div class="stats-row">
      <div class="stat-card">
        <div class="num" id="stat-total">—</div>
        <div class="lbl">Suscriptores totales</div>
      </div>
      <div class="stat-card">
        <div class="num" id="stat-hero">—</div>
        <div class="lbl">Desde hero</div>
      </div>
      <div class="stat-card">
        <div class="num" id="stat-cta">—</div>
        <div class="lbl">Desde CTA</div>
      </div>
    </div>

    <div class="section-header">
      <h2>Suscriptores</h2>
      <button class="refresh-btn" onclick="loadSubscribers()">↻ Actualizar</button>
    </div>

    <div id="table-wrap"></div>
  </main>
</div>

<script>
  const TOKEN_KEY = 'pu_admin_token';

  function token() { return localStorage.getItem(TOKEN_KEY); }

  async function login() {
    const pwd = document.getElementById('pwd').value;
    const err = document.getElementById('login-error');
    err.textContent = '';
    try {
      const res = await fetch('/admin/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: pwd }),
      });
      if (!res.ok) { err.textContent = 'Contraseña incorrecta'; return; }
      const { access_token } = await res.json();
      localStorage.setItem(TOKEN_KEY, access_token);
      showDashboard();
    } catch {
      err.textContent = 'Error de conexión';
    }
  }

  function logout() {
    localStorage.removeItem(TOKEN_KEY);
    document.getElementById('dashboard').style.display = 'none';
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('pwd').value = '';
  }

  function showDashboard() {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    loadSubscribers();
  }

  async function loadSubscribers() {
    const wrap = document.getElementById('table-wrap');
    wrap.innerHTML = '<p style="color:var(--muted);padding:16px">Cargando...</p>';
    try {
      const res = await fetch('/admin/subscribers', {
        headers: { Authorization: `Bearer ${token()}` },
      });
      if (res.status === 401) { logout(); return; }
      const data = await res.json();

      document.getElementById('stat-total').textContent = data.length;
      document.getElementById('stat-hero').textContent = data.filter(s => s.source === 'hero').length;
      document.getElementById('stat-cta').textContent  = data.filter(s => s.source === 'cta').length;

      if (!data.length) {
        wrap.innerHTML = '<div class="empty-state">Aún no hay suscriptores registrados.</div>';
        return;
      }

      wrap.innerHTML = `
        <table>
          <thead><tr>
            <th>#</th><th>Email</th><th>Fuente</th><th>Fecha</th>
          </tr></thead>
          <tbody>
            ${data.map((s, i) => `
              <tr>
                <td style="color:var(--muted)">${i + 1}</td>
                <td>${s.email}</td>
                <td><span class="source-badge source-${s.source}">${s.source}</span></td>
                <td style="color:var(--muted)">${new Date(s.created_at).toLocaleString('es-CO')}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>`;
    } catch {
      wrap.innerHTML = '<p style="color:var(--red);padding:16px">Error al cargar datos.</p>';
    }
  }

  // Auto-login si ya hay token
  if (token()) showDashboard();
</script>
</body>
</html>
