<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PreUrbano — Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0f; --surface: #111118; --border: rgba(255,255,255,0.07);
      --accent: #6c63ff; --text: #f0f0f5; --muted: #8888a0;
      --green: #34d399; --red: #f87171; --sidebar-w: 220px;
    }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* ── Login ── */
    #login-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .login-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 20px; padding: 48px 40px; width: 100%; max-width: 380px;
    }
    .login-card h1 { font-size: 1.4rem; font-weight: 700; margin-bottom: 6px; }
    .login-card p { color: var(--muted); font-size: 0.88rem; margin-bottom: 28px; }
    .field { margin-bottom: 16px; }
    .field label { display: block; font-size: 0.8rem; color: var(--muted); margin-bottom: 6px; }
    .field input {
      width: 100%; background: rgba(255,255,255,0.04); border: 1px solid var(--border);
      border-radius: 10px; padding: 10px 14px; color: var(--text);
      font-family: 'Inter', sans-serif; font-size: 0.95rem; outline: none; transition: border-color 0.2s;
    }
    .field input:focus { border-color: rgba(108,99,255,0.5); }
    .btn {
      width: 100%; background: var(--accent); color: #fff; border: none;
      border-radius: 10px; padding: 12px; font-family: 'Inter', sans-serif;
      font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.88; }
    .error-msg { color: var(--red); font-size: 0.82rem; margin-top: 12px; text-align: center; min-height: 18px; }

    /* ── Dashboard shell ── */
    #dashboard { display: none; height: 100vh; flex-direction: column; }
    #dashboard.visible { display: flex; }

    topbar {
      display: flex; align-items: center; justify-content: space-between;
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 14px 24px; flex-shrink: 0;
    }
    .logo { font-size: 1rem; font-weight: 700; display: flex; align-items: center; gap: 8px; }
    .logo-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); }
    .logout-btn {
      background: transparent; border: 1px solid var(--border); color: var(--muted);
      border-radius: 8px; padding: 6px 14px; font-family: 'Inter', sans-serif;
      font-size: 0.82rem; cursor: pointer; transition: all 0.2s;
    }
    .logout-btn:hover { border-color: var(--red); color: var(--red); }

    /* ── Sidebar + content ── */
    .body-wrap { display: flex; flex: 1; overflow: hidden; }

    sidebar {
      width: var(--sidebar-w); flex-shrink: 0;
      background: var(--surface); border-right: 1px solid var(--border);
      padding: 24px 12px; display: flex; flex-direction: column; gap: 4px;
    }
    .nav-label {
      font-size: 0.68rem; font-weight: 600; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.08em;
      padding: 0 12px; margin-bottom: 8px; margin-top: 4px;
    }
    .nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 12px; border-radius: 10px; cursor: pointer;
      font-size: 0.88rem; color: var(--muted); transition: all 0.15s;
      border: none; background: transparent; font-family: 'Inter', sans-serif;
      width: 100%; text-align: left;
    }
    .nav-item:hover { background: rgba(255,255,255,0.04); color: var(--text); }
    .nav-item.active { background: rgba(108,99,255,0.12); color: var(--accent); }
    .nav-item svg { flex-shrink: 0; opacity: 0.7; }
    .nav-item.active svg { opacity: 1; }

    /* ── Main content ── */
    .content { flex: 1; overflow-y: auto; padding: 32px 36px; }

    .stats-row { display: flex; gap: 14px; margin-bottom: 28px; flex-wrap: wrap; }
    .stat-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 14px; padding: 18px 22px; flex: 1; min-width: 120px;
    }
    .stat-card .num { font-size: 1.8rem; font-weight: 700; letter-spacing: -1px; }
    .stat-card .lbl { font-size: 0.75rem; color: var(--muted); margin-top: 2px; }

    .section-header {
      display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px;
    }
    .section-header h2 { font-size: 1rem; font-weight: 600; }
    .refresh-btn {
      background: transparent; border: 1px solid var(--border); color: var(--muted);
      border-radius: 8px; padding: 6px 14px; font-family: 'Inter', sans-serif;
      font-size: 0.82rem; cursor: pointer; transition: all 0.2s;
    }
    .refresh-btn:hover { border-color: var(--accent); color: var(--text); }

    table { width: 100%; border-collapse: collapse; }
    thead th {
      text-align: left; font-size: 0.72rem; font-weight: 500; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.06em;
      padding: 10px 16px; border-bottom: 1px solid var(--border);
    }
    tbody tr { transition: background 0.15s; }
    tbody tr:hover { background: rgba(255,255,255,0.02); }
    tbody td { padding: 11px 16px; font-size: 0.88rem; border-bottom: 1px solid var(--border); }
    .badge {
      display: inline-block; padding: 2px 10px; border-radius: 100px;
      font-size: 0.72rem; font-weight: 500;
    }
    .badge-hero   { background: rgba(108,99,255,0.15); color: #a59dff; }
    .badge-cta    { background: rgba(56,189,248,0.12); color: #7dd3fc; }
    .badge-active { background: rgba(52,211,153,0.12); color: #34d399; }
    .badge-off    { background: rgba(248,113,113,0.12); color: #f87171; }

    .user-avatar {
      width: 28px; height: 28px; border-radius: 50%; object-fit: cover;
      border: 1px solid var(--border); vertical-align: middle; margin-right: 8px;
    }
    .empty-state { text-align: center; padding: 48px; color: var(--muted); font-size: 0.9rem; }

    .view { display: none; }
    .view.active { display: block; }

    tbody tr.clickable { cursor: pointer; }

    /* ── Modal ── */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.6);
      display: flex; align-items: center; justify-content: center;
      z-index: 200; backdrop-filter: blur(4px);
    }
    .modal-overlay.hidden { display: none; }
    .modal {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 20px; padding: 32px; width: 100%; max-width: 440px;
      position: relative;
    }
    .modal-close {
      position: absolute; top: 16px; right: 16px;
      background: transparent; border: none; color: var(--muted);
      font-size: 1.2rem; cursor: pointer; line-height: 1;
      padding: 4px 8px; border-radius: 6px; transition: color 0.15s;
    }
    .modal-close:hover { color: var(--text); }
    .modal-header { display: flex; align-items: center; gap: 14px; margin-bottom: 24px; }
    .modal-avatar {
      width: 52px; height: 52px; border-radius: 50%; object-fit: cover;
      border: 2px solid var(--border); flex-shrink: 0;
    }
    .modal-avatar-placeholder {
      width: 52px; height: 52px; border-radius: 50%;
      background: rgba(108,99,255,0.15); border: 2px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.4rem; flex-shrink: 0;
    }
    .modal-name { font-size: 1rem; font-weight: 700; }
    .modal-email { font-size: 0.82rem; color: var(--muted); margin-top: 2px; }
    .modal-fields { display: flex; flex-direction: column; gap: 12px; }
    .modal-field { display: flex; justify-content: space-between; align-items: center; padding: 10px 14px; background: rgba(255,255,255,0.03); border-radius: 10px; }
    .modal-field .lbl { font-size: 0.75rem; color: var(--muted); }
    .modal-field .val { font-size: 0.88rem; font-weight: 500; }
    .val-empty { color: var(--muted); font-style: italic; font-weight: 400 !important; }
  </style>
</head>
<body>

<!-- Login -->
<div id="login-screen">
  <div class="login-card">
    <h1>PreUrbano Admin</h1>
    <p>Ingresa tu contraseña para continuar</p>
    <div class="field">
      <label>Contraseña</label>
      <input type="password" id="pwd" placeholder="••••••••" onkeydown="if(event.key==='Enter')login()" />
    </div>
    <button class="btn" onclick="login()">Ingresar</button>
    <div class="error-msg" id="login-error"></div>
  </div>
</div>

<!-- User detail modal -->
<div class="modal-overlay hidden" id="user-modal" onclick="closeModal(event)">
  <div class="modal">
    <button class="modal-close" onclick="document.getElementById('user-modal').classList.add('hidden')">✕</button>
    <div class="modal-header">
      <div id="modal-avatar"></div>
      <div>
        <div class="modal-name" id="modal-name"></div>
        <div class="modal-email" id="modal-email"></div>
      </div>
    </div>
    <div class="modal-fields">
      <div class="modal-field"><span class="lbl">Documento</span><span class="val" id="modal-document"></span></div>
      <div class="modal-field"><span class="lbl">Teléfono</span><span class="val" id="modal-phone"></span></div>
      <div class="modal-field"><span class="lbl">Estado</span><span class="val" id="modal-status"></span></div>
      <div class="modal-field"><span class="lbl">Registro</span><span class="val" id="modal-created"></span></div>
    </div>
  </div>
</div>

<!-- Dashboard -->
<div id="dashboard">
  <topbar>
    <div class="logo"><div class="logo-dot"></div> PreUrbano Admin</div>
    <button class="logout-btn" onclick="logout()">Cerrar sesión</button>
  </topbar>

  <div class="body-wrap">
    <sidebar>
      <div class="nav-label">Menú</div>
      <button class="nav-item active" id="nav-subscribers" onclick="switchView('subscribers')">
        <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
        </svg>
        Correos
      </button>
      <button class="nav-item" id="nav-users" onclick="switchView('users')">
        <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
          <path stroke-linecap="round" stroke-linejoin="round" d="M17 20h5v-2a4 4 0 00-4-4h-1M9 20H4v-2a4 4 0 014-4h1m4-4a4 4 0 100-8 4 4 0 000 8z"/>
        </svg>
        Usuarios
      </button>
    </sidebar>

    <div class="content">

      <!-- Vista: Correos -->
      <div class="view active" id="view-subscribers">
        <div class="stats-row">
          <div class="stat-card">
            <div class="num" id="stat-total">—</div>
            <div class="lbl">Suscriptores totales</div>
          </div>
          <div class="stat-card">
            <div class="num" id="stat-hero">—</div>
            <div class="lbl">Desde hero</div>
          </div>
          <div class="stat-card">
            <div class="num" id="stat-cta">—</div>
            <div class="lbl">Desde CTA</div>
          </div>
        </div>
        <div class="section-header">
          <h2>Correos registrados</h2>
          <button class="refresh-btn" onclick="loadSubscribers()">↻ Actualizar</button>
        </div>
        <div id="table-subscribers"></div>
      </div>

      <!-- Vista: Usuarios -->
      <div class="view" id="view-users">
        <div class="stats-row">
          <div class="stat-card">
            <div class="num" id="stat-users-total">—</div>
            <div class="lbl">Usuarios totales</div>
          </div>
          <div class="stat-card">
            <div class="num" id="stat-users-active">—</div>
            <div class="lbl">Activos</div>
          </div>
        </div>
        <div class="section-header">
          <h2>Usuarios con Google</h2>
          <button class="refresh-btn" onclick="loadUsers()">↻ Actualizar</button>
        </div>
        <div id="table-users"></div>
      </div>

    </div>
  </div>
</div>

<script>
  const TOKEN_KEY = 'pu_admin_token';
  let currentView = 'subscribers';

  function token() { return localStorage.getItem(TOKEN_KEY); }

  async function login() {
    const pwd = document.getElementById('pwd').value;
    const err = document.getElementById('login-error');
    err.textContent = '';
    try {
      const res = await fetch('/login', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: pwd }),
      });
      if (!res.ok) { err.textContent = 'Contraseña incorrecta'; return; }
      const { access_token } = await res.json();
      localStorage.setItem(TOKEN_KEY, access_token);
      showDashboard();
    } catch { err.textContent = 'Error de conexión'; }
  }

  function logout() {
    localStorage.removeItem(TOKEN_KEY);
    document.getElementById('dashboard').classList.remove('visible');
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('pwd').value = '';
  }

  function showDashboard() {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('dashboard').classList.add('visible');
    loadSubscribers();
  }

  function switchView(view) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    document.getElementById('view-' + view).classList.add('active');
    document.getElementById('nav-' + view).classList.add('active');
    currentView = view;
    if (view === 'subscribers') loadSubscribers();
    if (view === 'users') loadUsers();
  }

  async function loadSubscribers() {
    const wrap = document.getElementById('table-subscribers');
    wrap.innerHTML = '<p style="color:var(--muted);padding:16px">Cargando...</p>';
    try {
      const res = await fetch('/subscribers', { headers: { Authorization: `Bearer ${token()}` } });
      if (res.status === 401) { logout(); return; }
      const data = await res.json();

      document.getElementById('stat-total').textContent = data.length;
      document.getElementById('stat-hero').textContent = data.filter(s => s.source === 'hero').length;
      document.getElementById('stat-cta').textContent  = data.filter(s => s.source === 'cta').length;

      if (!data.length) {
        wrap.innerHTML = '<div class="empty-state">Aún no hay correos registrados.</div>';
        return;
      }
      wrap.innerHTML = `
        <table>
          <thead><tr><th>#</th><th>Email</th><th>Fuente</th><th>Fecha</th></tr></thead>
          <tbody>${data.map((s, i) => `
            <tr>
              <td style="color:var(--muted)">${i + 1}</td>
              <td>${s.email}</td>
              <td><span class="badge badge-${s.source}">${s.source}</span></td>
              <td style="color:var(--muted)">${new Date(s.created_at).toLocaleString('es-CO')}</td>
            </tr>`).join('')}
          </tbody>
        </table>`;
    } catch { wrap.innerHTML = '<p style="color:var(--red);padding:16px">Error al cargar datos.</p>'; }
  }

  async function loadUsers() {
    const wrap = document.getElementById('table-users');
    wrap.innerHTML = '<p style="color:var(--muted);padding:16px">Cargando...</p>';
    try {
      const res = await fetch('/users', { headers: { Authorization: `Bearer ${token()}` } });
      if (res.status === 401) { logout(); return; }
      const data = await res.json();

      document.getElementById('stat-users-total').textContent = data.length;
      document.getElementById('stat-users-active').textContent = data.filter(u => u.is_active).length;

      if (!data.length) {
        wrap.innerHTML = '<div class="empty-state">Aún no hay usuarios registrados.</div>';
        return;
      }
      wrap.innerHTML = `
        <table>
          <thead><tr><th>#</th><th>Usuario</th><th>Email</th><th>Estado</th><th>Registro</th></tr></thead>
          <tbody>${data.map((u, i) => `
            <tr class="clickable" onclick='openUserModal(${JSON.stringify(u)})'>
              <td style="color:var(--muted)">${i + 1}</td>
              <td>
                ${u.picture ? `<img class="user-avatar" src="${u.picture}" referrerpolicy="no-referrer" />` : ''}
                ${u.name}
              </td>
              <td style="color:var(--muted)">${u.email}</td>
              <td><span class="badge ${u.is_active ? 'badge-active' : 'badge-off'}">${u.is_active ? 'activo' : 'inactivo'}</span></td>
              <td style="color:var(--muted)">${new Date(u.created_at).toLocaleString('es-CO')}</td>
            </tr>`).join('')}
          </tbody>
        </table>`;
    } catch { wrap.innerHTML = '<p style="color:var(--red);padding:16px">Error al cargar datos.</p>'; }
  }

  function openUserModal(u) {
    const empty = '<span class="val-empty">Sin completar</span>';
    document.getElementById('modal-avatar').innerHTML = u.picture
      ? `<img class="modal-avatar" src="${u.picture}" referrerpolicy="no-referrer" />`
      : `<div class="modal-avatar-placeholder">👤</div>`;
    document.getElementById('modal-name').textContent    = u.name;
    document.getElementById('modal-email').textContent   = u.email;
    document.getElementById('modal-document').innerHTML  = u.document_id || empty;
    document.getElementById('modal-phone').innerHTML     = u.phone || empty;
    document.getElementById('modal-status').innerHTML    = `<span class="badge ${u.is_active ? 'badge-active' : 'badge-off'}">${u.is_active ? 'activo' : 'inactivo'}</span>`;
    document.getElementById('modal-created').textContent = new Date(u.created_at).toLocaleString('es-CO');
    document.getElementById('user-modal').classList.remove('hidden');
  }

  function closeModal(e) {
    if (e.target === document.getElementById('user-modal'))
      document.getElementById('user-modal').classList.add('hidden');
  }

  if (token()) showDashboard();
</script>
</body>
</html>
