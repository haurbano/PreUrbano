<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PreUrbano — Mi cuenta</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0f; --surface: #111118; --border: rgba(255,255,255,0.07);
      --accent: #6c63ff; --text: #f0f0f5; --muted: #8888a0;
      --green: #34d399;
    }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    nav {
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 16px 32px; display: flex; align-items: center; justify-content: space-between;
    }
    .logo { font-size: 1rem; font-weight: 700; display: flex; align-items: center; gap: 8px; }
    .logo-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); }
    .logout-btn {
      background: transparent; border: 1px solid var(--border); color: var(--muted);
      border-radius: 8px; padding: 6px 14px; font-family: 'Inter', sans-serif;
      font-size: 0.82rem; cursor: pointer; transition: all 0.2s;
    }
    .logout-btn:hover { border-color: rgba(248,113,113,0.5); color: #f87171; }

    main {
      max-width: 560px; margin: 80px auto; padding: 0 24px;
      display: flex; flex-direction: column; align-items: center; text-align: center;
    }

    .avatar {
      width: 80px; height: 80px; border-radius: 50%;
      border: 2px solid var(--border); margin-bottom: 20px; object-fit: cover;
    }
    .avatar-placeholder {
      width: 80px; height: 80px; border-radius: 50%;
      background: var(--surface); border: 2px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 2rem; margin-bottom: 20px;
    }

    h1 { font-size: 1.6rem; font-weight: 700; margin-bottom: 6px; }
    .email { color: var(--muted); font-size: 0.9rem; margin-bottom: 32px; }

    .status-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; padding: 28px 32px; width: 100%;
    }
    .status-dot {
      display: inline-block; width: 8px; height: 8px; border-radius: 50%;
      background: var(--green); margin-right: 8px;
      box-shadow: 0 0 8px rgba(52,211,153,0.5);
    }
    .status-label { font-size: 0.78rem; font-weight: 600; color: var(--green); text-transform: uppercase; letter-spacing: 0.08em; }
    .status-msg { font-size: 1rem; color: var(--text); margin-top: 12px; line-height: 1.6; }
    .status-sub { font-size: 0.82rem; color: var(--muted); margin-top: 8px; }
  </style>
</head>
<body>

<nav>
  <div class="logo"><div class="logo-dot"></div> PreUrbano</div>
  <button class="logout-btn" onclick="logout()">Cerrar sesión</button>
</nav>

<main id="main" style="display:none">
  <div id="avatar-wrap"></div>
  <h1 id="name"></h1>
  <div class="email" id="email"></div>
  <div class="status-card">
    <div><span class="status-dot"></span><span class="status-label">En lista de espera</span></div>
    <p class="status-msg">Estás registrado. Te notificaremos en cuanto PreUrbano esté disponible.</p>
    <p class="status-sub">Mientras tanto, comparte con tus compañeros de colegio 🚀</p>
  </div>
</main>

<script>
  const TOKEN_KEY = 'pu_user_token';

  function parseJwt(token) {
    try {
      return JSON.parse(atob(token.split('.')[1]));
    } catch { return null; }
  }

  function logout() {
    localStorage.removeItem(TOKEN_KEY);
    window.location.href = '/';
  }

  function init() {
    // Capture token from URL after OAuth redirect
    const params = new URLSearchParams(window.location.search);
    const urlToken = params.get('token');
    if (urlToken) {
      localStorage.setItem(TOKEN_KEY, urlToken);
      history.replaceState({}, '', '/app');
    }

    const token = localStorage.getItem(TOKEN_KEY);
    if (!token) { window.location.href = '/'; return; }

    const payload = parseJwt(token);
    if (!payload || payload.exp * 1000 < Date.now()) {
      logout();
      return;
    }

    // Fetch full profile from API
    fetch('/auth/me', { headers: { Authorization: `Bearer ${token}` } })
      .then(r => r.ok ? r.json() : null)
      .then(user => {
        if (!user) { logout(); return; }
        document.getElementById('name').textContent = user.name;
        document.getElementById('email').textContent = user.email;
        const wrap = document.getElementById('avatar-wrap');
        if (user.picture) {
          wrap.innerHTML = `<img class="avatar" src="${user.picture}" alt="${user.name}" referrerpolicy="no-referrer" />`;
        } else {
          wrap.innerHTML = `<div class="avatar-placeholder">👤</div>`;
        }
        document.getElementById('main').style.display = 'flex';
      })
      .catch(logout);
  }

  init();
</script>
</body>
</html>
