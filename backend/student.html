<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PreUrbano — Mi cuenta</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0f; --surface: #111118; --border: rgba(255,255,255,0.07);
      --accent: #6c63ff; --text: #f0f0f5; --muted: #8888a0;
      --green: #34d399; --red: #f87171; --sidebar-w: 220px;
    }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* ── Shell ── */
    #app { display: none; height: 100vh; flex-direction: column; }
    #app.visible { display: flex; }

    topbar {
      display: flex; align-items: center; justify-content: space-between;
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 14px 24px; flex-shrink: 0;
    }
    .logo { font-size: 1rem; font-weight: 700; display: flex; align-items: center; gap: 8px; }
    .logo-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); }
    .logout-btn {
      background: transparent; border: 1px solid var(--border); color: var(--muted);
      border-radius: 8px; padding: 6px 14px; font-family: 'Inter', sans-serif;
      font-size: 0.82rem; cursor: pointer; transition: all 0.2s;
    }
    .logout-btn:hover { border-color: var(--red); color: var(--red); }

    .body-wrap { display: flex; flex: 1; overflow: hidden; }

    /* ── Sidebar ── */
    sidebar {
      width: var(--sidebar-w); flex-shrink: 0;
      background: var(--surface); border-right: 1px solid var(--border);
      padding: 24px 12px; display: flex; flex-direction: column; gap: 4px;
    }

    /* Avatar en sidebar */
    .sidebar-user {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px; margin-bottom: 12px;
      border-bottom: 1px solid var(--border); padding-bottom: 16px;
    }
    .sidebar-avatar {
      width: 32px; height: 32px; border-radius: 50%; object-fit: cover;
      border: 1px solid var(--border); flex-shrink: 0;
    }
    .sidebar-avatar-placeholder {
      width: 32px; height: 32px; border-radius: 50%;
      background: rgba(108,99,255,0.15); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.9rem; flex-shrink: 0;
    }
    .sidebar-name { font-size: 0.82rem; font-weight: 600; color: var(--text); line-height: 1.2; }
    .sidebar-email { font-size: 0.72rem; color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 130px; }

    .nav-label {
      font-size: 0.68rem; font-weight: 600; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.08em;
      padding: 0 12px; margin-bottom: 6px; margin-top: 4px;
    }
    .nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 12px; border-radius: 10px; cursor: pointer;
      font-size: 0.88rem; color: var(--muted); transition: all 0.15s;
      border: none; background: transparent; font-family: 'Inter', sans-serif;
      width: 100%; text-align: left;
    }
    .nav-item:hover { background: rgba(255,255,255,0.04); color: var(--text); }
    .nav-item.active { background: rgba(108,99,255,0.12); color: var(--accent); }
    .nav-item svg { flex-shrink: 0; opacity: 0.7; }
    .nav-item.active svg { opacity: 1; }

    /* ── Content ── */
    .content { flex: 1; overflow-y: auto; padding: 36px 40px; }
    .view { display: none; }
    .view.active { display: block; }

    /* ── Inicio ── */
    .welcome-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; padding: 28px 32px; max-width: 520px;
    }
    .status-dot {
      display: inline-block; width: 8px; height: 8px; border-radius: 50%;
      background: var(--green); margin-right: 8px;
      box-shadow: 0 0 8px rgba(52,211,153,0.5);
    }
    .status-label { font-size: 0.75rem; font-weight: 600; color: var(--green); text-transform: uppercase; letter-spacing: 0.08em; }
    .status-msg { font-size: 1rem; color: var(--text); margin-top: 12px; line-height: 1.6; }
    .status-sub { font-size: 0.82rem; color: var(--muted); margin-top: 8px; }

    /* ── Perfil ── */
    .profile-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; padding: 28px 32px; max-width: 480px;
    }
    .profile-card h2 { font-size: 1rem; font-weight: 600; margin-bottom: 4px; }
    .profile-card .sub { font-size: 0.82rem; color: var(--muted); margin-bottom: 24px; }

    .form-field { margin-bottom: 18px; }
    .form-field label { display: block; font-size: 0.78rem; color: var(--muted); margin-bottom: 6px; font-weight: 500; }
    .form-field input {
      width: 100%; background: rgba(255,255,255,0.04); border: 1px solid var(--border);
      border-radius: 10px; padding: 10px 14px; color: var(--text);
      font-family: 'Inter', sans-serif; font-size: 0.92rem; outline: none; transition: border-color 0.2s;
    }
    .form-field input:focus { border-color: rgba(108,99,255,0.5); }
    .form-field input:disabled { opacity: 0.45; cursor: not-allowed; }

    .save-btn {
      background: var(--accent); color: #fff; border: none;
      border-radius: 10px; padding: 10px 24px; font-family: 'Inter', sans-serif;
      font-size: 0.9rem; font-weight: 600; cursor: pointer; transition: opacity 0.2s;
    }
    .save-btn:hover { opacity: 0.88; }
    .save-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .form-msg { font-size: 0.82rem; margin-top: 12px; min-height: 18px; }
    .form-msg.ok  { color: var(--green); }
    .form-msg.err { color: var(--red); }

    /* ── Simulacro ── */
    .sim-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; padding: 28px 32px; max-width: 680px;
      margin: 0 auto;
    }
    .sim-card h2 { font-size: 1rem; font-weight: 600; margin-bottom: 4px; }
    .sim-card .sub { font-size: 0.82rem; color: var(--muted); margin-bottom: 24px; }
    .sim-start-btn {
      display: block; width: 100%; background: var(--accent); color: #fff; border: none;
      border-radius: 12px; padding: 16px; font-family: 'Inter', sans-serif;
      font-size: 1rem; font-weight: 600; cursor: pointer; transition: opacity 0.2s;
    }
    .sim-start-btn:hover { opacity: 0.88; }
    .sim-progress {
      display: flex; align-items: center; gap: 12px; margin-bottom: 24px;
    }
    .sim-progress-bar {
      flex: 1; height: 6px; background: rgba(255,255,255,0.08); border-radius: 100px; overflow: hidden;
    }
    .sim-progress-fill {
      height: 100%; background: var(--accent); border-radius: 100px;
      transition: width 0.3s ease;
    }
    .sim-progress-text { font-size: 0.82rem; color: var(--muted); white-space: nowrap; }
    .sim-question-img-wrap {
      display: flex; justify-content: center; margin-bottom: 24px;
    }
    .sim-question-img {
      max-width: 100%; max-height: 420px; height: auto; object-fit: contain;
      border-radius: 12px; border: 1px solid var(--border);
    }
    .sim-options {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 24px;
    }
    .sim-option-btn {
      background: rgba(255,255,255,0.04); border: 1.5px solid var(--border); border-radius: 12px;
      padding: 14px 8px; font-family: 'Inter', sans-serif; font-size: 1.1rem; font-weight: 700;
      color: var(--text); cursor: pointer; transition: all 0.15s; text-align: center;
    }
    .sim-option-btn:hover { border-color: var(--accent); background: rgba(108,99,255,0.08); }
    .sim-option-btn.selected { border-color: var(--accent); background: rgba(108,99,255,0.15); color: var(--accent); }
    .sim-nav-btn {
      display: block; width: 100%; background: var(--accent); color: #fff; border: none;
      border-radius: 12px; padding: 14px; font-family: 'Inter', sans-serif;
      font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: opacity 0.2s;
    }
    .sim-nav-btn:hover { opacity: 0.88; }
    .sim-nav-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .sim-result-score {
      text-align: center; margin-bottom: 28px;
    }
    .sim-result-score .big-score {
      font-size: 3.5rem; font-weight: 700; letter-spacing: -2px; line-height: 1;
    }
    .sim-result-score .big-score .pct { font-size: 1.4rem; color: var(--muted); font-weight: 500; }
    .sim-result-score .score-label { font-size: 0.82rem; color: var(--muted); margin-top: 6px; }
    .sim-breakdown { display: flex; flex-direction: column; gap: 8px; margin-bottom: 28px; }
    .sim-breakdown-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 14px; background: rgba(255,255,255,0.03); border-radius: 10px;
    }
    .sim-breakdown-row .bd-label { font-size: 0.85rem; color: var(--muted); }
    .sim-breakdown-row .bd-val { font-size: 0.88rem; font-weight: 600; }
    .sim-breakdown-row .bd-bar {
      flex: 1; margin: 0 12px; height: 4px; background: rgba(255,255,255,0.08);
      border-radius: 100px; overflow: hidden; max-width: 120px;
    }
    .sim-breakdown-row .bd-fill { height: 100%; background: var(--green); border-radius: 100px; }
    .sim-back-btn {
      display: block; width: 100%; background: transparent; color: var(--muted);
      border: 1px solid var(--border); border-radius: 12px; padding: 12px;
      font-family: 'Inter', sans-serif; font-size: 0.9rem; cursor: pointer; transition: all 0.2s;
    }
    .sim-back-btn:hover { border-color: var(--text); color: var(--text); }
    .sim-empty { text-align: center; padding: 32px; color: var(--muted); }
  </style>
</head>
<body>

<div id="app">
  <topbar>
    <div class="logo"><div class="logo-dot"></div> PreUrbano</div>
    <button class="logout-btn" onclick="logout()">Cerrar sesión</button>
  </topbar>

  <div class="body-wrap">
    <sidebar>
      <div class="sidebar-user">
        <div id="sb-avatar"></div>
        <div>
          <div class="sidebar-name" id="sb-name"></div>
          <div class="sidebar-email" id="sb-email"></div>
        </div>
      </div>

      <div class="nav-label">Menú</div>
      <button class="nav-item active" id="nav-inicio" onclick="switchView('inicio')">
        <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7m-9 2v8m4-8v8m-4 0h4"/>
        </svg>
        Inicio
      </button>
      <button class="nav-item" id="nav-simulacro" onclick="switchView('simulacro')">
        <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"/>
        </svg>
        Simulacro
      </button>
      <button class="nav-item" id="nav-perfil" onclick="switchView('perfil')">
        <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
          <path stroke-linecap="round" stroke-linejoin="round" d="M5.121 17.804A9 9 0 1118.88 6.196M15 11a3 3 0 11-6 0 3 3 0 016 0z"/>
        </svg>
        Mis datos
      </button>
    </sidebar>

    <div class="content">

      <!-- Vista: Inicio -->
      <div class="view active" id="view-inicio">
        <div class="welcome-card">
          <div><span class="status-dot"></span><span class="status-label">En lista de espera</span></div>
          <p class="status-msg">Estás registrado. Te notificaremos en cuanto PreUrbano esté disponible.</p>
          <p class="status-sub">Mientras tanto, comparte con tus compañeros de colegio 🚀</p>
        </div>
      </div>

      <!-- Vista: Mis datos -->
      <div class="view" id="view-perfil">
        <div class="profile-card">
          <h2>Mis datos</h2>
          <p class="sub">Esta información nos ayuda a personalizar tu experiencia.</p>

          <div class="form-field">
            <label>Correo electrónico</label>
            <input type="email" id="field-email" disabled />
          </div>
          <div class="form-field">
            <label>Nombre completo</label>
            <input type="text" id="field-name" placeholder="Tu nombre completo" />
          </div>
          <div class="form-field">
            <label>Documento de identidad</label>
            <input type="text" id="field-document" placeholder="Número de documento" />
          </div>
          <div class="form-field">
            <label>Teléfono de contacto</label>
            <input type="tel" id="field-phone" placeholder="Ej. 3001234567" />
          </div>

          <button class="save-btn" id="save-btn" onclick="saveProfile()">Guardar cambios</button>
          <div class="form-msg" id="profile-msg"></div>
        </div>
      </div>

      <!-- Vista: Simulacro -->
      <div class="view" id="view-simulacro">
        <div class="sim-card" id="sim-container"></div>
      </div>

    </div>
  </div>
</div>

<script>
  let currentUser = null;

  function logout() {
    window.location.href = '/auth/logout';
  }

  function switchView(view) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    document.getElementById('view-' + view).classList.add('active');
    document.getElementById('nav-' + view).classList.add('active');
    if (view === 'simulacro') loadSimIdle();
  }

  async function loadSimIdle() {
    try {
      const res = await fetch('/api/simulation/start', { method: 'POST' });
      if (res.status === 401) { logout(); return; }
      const data = await res.json();
      _sim = { simulationId: null, questions: data.questions || [], currentIndex: 0, answers: [] };
      renderSimIdle(data.total_available || 0);
    } catch { renderSimIdle(0); }
  }

  async function init() {
    localStorage.removeItem('pu_user_token');

    try {
      const res = await fetch('/auth/me');
      if (!res.ok) { window.location.href = '/'; return; }
      const user = await res.json();
      renderUser(user);
      document.getElementById('app').classList.add('visible');
      if (!user.is_active) {
        document.getElementById('nav-simulacro').style.display = 'none';
        document.getElementById('view-inicio').querySelector('.status-label').textContent = 'Cuenta inactiva';
        document.getElementById('view-inicio').querySelector('.status-msg').textContent = 'Tu cuenta aún no ha sido activada. Contacta al equipo de PreUrbano.';
        document.getElementById('view-inicio').querySelector('.status-dot').style.background = 'var(--red)';
        document.getElementById('view-inicio').querySelector('.status-dot').style.boxShadow = 'none';
      }
    } catch { window.location.href = '/'; }
  }

  init();
</script>
</body>
</html>
